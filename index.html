<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f59e0b">
<title>Horas Extras</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --accent: #f59e0b;
    --accent-dim: rgba(245,158,11,0.15);
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --border: #333;
    --radius: 14px;
    --radius-sm: 8px;
    --input-h: 44px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }
  .app-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 16px 10px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .app-logo { width: 36px; height: 36px; flex-shrink: 0; }
  .app-title { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
  .month-card {
    margin: 14px 16px 0;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 8px;
    gap: 8px;
  }
  .month-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-size: 20px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    user-select: none;
  }
  .month-btn:active { background: var(--accent-dim); }
  .month-label {
    flex: 1;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    text-transform: capitalize;
    letter-spacing: -0.2px;
  }
  .total-card {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .total-label {
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 500;
  }
  .total-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
  }
  .total-sub { font-size: 12px; color: var(--text-dim); margin-top: 1px; text-align: right; }
  .days-container {
    padding: 14px 16px 32px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }
  .day-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    padding: 10px 12px;
  }
  .day-row.has-value {
    border-color: rgba(245,158,11,0.4);
    background: rgba(245,158,11,0.05);
  }
  .day-row.weekend { background: var(--surface2); }
  .day-info { display: flex; flex-direction: column; min-width: 52px; }
  .day-num { font-size: 17px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
  .day-name { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .day-row.weekend .day-num { color: var(--text-dim); }
  .day-row.weekend .day-name { color: var(--text-dim); }
  .day-input-wrap { flex: 1; display: flex; align-items: center; gap: 6px; }
  .min-input {
    flex: 1;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 16px;
    font-weight: 500;
    height: var(--input-h);
    padding: 0 12px;
    text-align: right;
    outline: none;
    font-variant-numeric: tabular-nums;
    -webkit-appearance: none;
  }
  .min-input:focus { border-color: var(--accent); background: rgba(245,158,11,0.08); }
  .min-input::placeholder { color: var(--text-dim); }
  .min-label { font-size: 12px; color: var(--text-muted); min-width: 24px; }
  .day-hours-badge {
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-dim);
    border-radius: 6px;
    padding: 2px 7px;
    font-weight: 600;
    min-width: 44px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .day-hours-badge.hidden { visibility: hidden; }
  .clear-month-btn {
    display: block;
    margin: 4px 16px 0;
    width: calc(100% - 32px);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 14px;
    padding: 10px;
    cursor: pointer;
    text-align: center;
  }
  .clear-month-btn:active { background: rgba(255,80,80,0.1); border-color: #e74c3c; color: #e74c3c; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<div class="app-header">
  <svg class="app-logo" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <circle cx="18" cy="18" r="15" fill="#1a1a1a" stroke="#f59e0b" stroke-width="2"/>
    <line x1="18" y1="5" x2="18" y2="8" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="28" x2="18" y2="31" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="18" x2="8" y2="18" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="28" y1="18" x2="31" y2="18" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="18" x2="18" y2="10" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="18" x2="23" y2="21" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <circle cx="18" cy="18" r="2" fill="#f59e0b"/>
    <text x="7" y="27" font-family="sans-serif" font-size="7" font-weight="700" fill="#f59e0b">HE</text>
  </svg>
  <span class="app-title">Horas Extras</span>
</div>

<div class="month-card">
  <div class="month-nav">
    <button class="month-btn" id="prevBtn">&#8249;</button>
    <div class="month-label" id="monthLabel">—</div>
    <button class="month-btn" id="nextBtn">&#8250;</button>
  </div>
  <div class="total-card">
    <div>
      <div class="total-label">Total del mes</div>
      <div class="total-sub" id="totalMinText">0 minutos</div>
    </div>
    <div>
      <div class="total-value" id="totalDisplay">0h 00m</div>
    </div>
  </div>
</div>

<div class="days-container" id="daysContainer"></div>
<button class="clear-month-btn" id="clearBtn">Limpiar mes</button>
<div style="height:16px"></div>

<script>
const DAYS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();

function storageKey(y, m) { return `he_${y}_${m}`; }
function loadData(y, m) { try { const r = localStorage.getItem(storageKey(y,m)); return r ? JSON.parse(r) : {}; } catch { return {}; } }
function saveData(y, m, d) { localStorage.setItem(storageKey(y,m), JSON.stringify(d)); }
function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }

function formatTotal(t) {
  const h = Math.floor(t/60), m = t%60;
  return `${h}h ${String(m).padStart(2,'0')}m`;
}
function formatBadge(min) {
  if (!min) return '';
  const h = Math.floor(min/60), m = min%60;
  if (h > 0) return `${h}h${m > 0 ? String(m).padStart(2,'0') : ''}`;
  return `${m}m`;
}

function updateTotal() {
  const data = loadData(currentYear, currentMonth);
  let t = 0;
  for (const v of Object.values(data)) { const n = parseInt(v,10); if (!isNaN(n) && n>0) t+=n; }
  document.getElementById('totalDisplay').textContent = formatTotal(t);
  document.getElementById('totalMinText').textContent = t===0 ? '0 minutos' : `${t} minutos`;
}

function renderMonth() {
  const data = loadData(currentYear, currentMonth);
  const numDays = daysInMonth(currentYear, currentMonth);
  document.getElementById('monthLabel').textContent = `${MONTHS_ES[currentMonth]} ${currentYear}`;
  updateTotal();

  const container = document.getElementById('daysContainer');
  container.innerHTML = '';

  for (let d = 1; d <= numDays; d++) {
    const date = new Date(currentYear, currentMonth, d);
    const dow = date.getDay();
    const isWeekend = dow===0 || dow===6;
    const val = data[d] ? parseInt(data[d],10) : 0;
    const badge = val > 0 ? formatBadge(val) : '';

    const row = document.createElement('div');
    row.className = 'day-row' + (isWeekend?' weekend':'') + (val>0?' has-value':'');

    row.innerHTML = `
      <div class="day-info">
        <span class="day-num">${d}</span>
        <span class="day-name">${DAYS_ES[dow]}</span>
      </div>
      <div class="day-input-wrap">
        <input class="min-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="1440" placeholder="0" value="${val>0?val:''}" data-day="${d}" aria-label="Minutos día ${d}">
        <span class="min-label">min</span>
      </div>
      <span class="day-hours-badge${badge?'':' hidden'}" id="badge_${d}">${badge}</span>
    `;

    const input = row.querySelector('.min-input');
    input.addEventListener('input', () => {
      const minutes = parseInt(input.value, 10);
      const data2 = loadData(currentYear, currentMonth);
      if (!isNaN(minutes) && minutes > 0) data2[d] = minutes;
      else delete data2[d];
      saveData(currentYear, currentMonth, data2);

      const badgeEl = document.getElementById(`badge_${d}`);
      const b = (!isNaN(minutes) && minutes>0) ? formatBadge(minutes) : '';
      badgeEl.textContent = b;
      badgeEl.classList.toggle('hidden', !b);
      row.classList.toggle('has-value', !isNaN(minutes) && minutes>0);
      updateTotal();
    });

    container.appendChild(row);
  }
}

document.getElementById('prevBtn').addEventListener('click', () => {
  currentMonth--; if (currentMonth<0){currentMonth=11;currentYear--;} renderMonth(); window.scrollTo(0,0);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  currentMonth++; if (currentMonth>11){currentMonth=0;currentYear++;} renderMonth(); window.scrollTo(0,0);
});
document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm(`¿Borrar todos los datos de ${MONTHS_ES[currentMonth]} ${currentYear}?`)) {
    localStorage.removeItem(storageKey(currentYear, currentMonth)); renderMonth();
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

renderMonth();
</script>
</body>
</html>
